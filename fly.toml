app = 'vitrine-backend--0mx-a'
primary_region = 'gru'

[build]

[deploy]
  release_command = 'php artisan migrate --force'

[env]
  APP_ENV  = 'production'
  APP_DEBUG = 'false'
  LOG_CHANNEL = 'stderr'
  LOG_LEVEL = 'error'

[http_service]
  internal_port       = 8080
  force_https         = true
  auto_stop_machines  = 'stop'
  auto_start_machines = true
  min_machines_running = 0

  [http_service.concurrency]
    type       = 'requests'
    soft_limit = 200
    hard_limit = 250

[[vm]]
  memory   = '256mb'
  cpu_kind = 'shared'
  cpus     = 1

[[statics]]
  guest_path = '/var/www/html/public'
  url_prefix = '/build'
